<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A Secret Message</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

    <div class="night-scene">
        <div class="moon"></div> 


        <div class="stars">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>

    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
        </div>



        <div class="ocean">
    <div class="moon-reflection"></div>
    <div class="wave-layer wave-layer-1"></div>
    <div class="wave-layer wave-layer-2"></div>
    <div class="wave-layer wave-layer-3"></div>
    <div class="wave-shine wave-shine-1"></div>
    <div class="wave-shine wave-shine-2"></div>
    </div>

    <main class="page">

        <section class="intro-text">
    <p class="dedicated-text">For Someone Special 💗</p>
    <h2>A Message From My Heart 💗</h2> 
    <p class="hint-text">Tap The Message Box To Open It</p> 
        </section>

        <section class="message-section">

            <div class="secret-box" id="secretBox" role="button" tabindex="0">

                <div class="box-lid"></div>

                <div class="closed-text">
                <span class="closed-sub">Tap Here</span> 
                </div> 

                <div class="box-door left-door"></div>
                <div class="box-door right-door"></div>

                <div class="inside-message">
    <h1 id="messageText">I <span class="heart-word">❤️</span> You</h1>
    <p id="subText">Straight From My Heart, Made Only For You</p> 
                </div>

            </div>

        </section>

        <p class="footer-text">Under The Same Sky From My Heart 💫</p> 

    </main>

    <script src="static/js/script.js"></script>
</body>
</html>
