<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A Secret Message</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="static/css/style.css"> 
</head>
<body>

    <div class="background-hearts"></div>

    <main class="page">

    <section class="top-area" id="loveButton">
    <div class="love-icon">💌</div>
    </section>

        <section class="message-section">

            <div class="secret-box" id="secretBox">

                <div class="box-lid"></div>

                <div class="box-door left-door"></div>
                <div class="box-door right-door"></div>

                <div class="inside-message">
                    <h1 id="messageText">I Love You</h1>
                    <p id="subText">A little piece of my heart, made only for you.</p> 
                </div>

            </div>

        </section>

        <p class="footer-text">Made with love 💕</p>

    </main>

    <script src="static/js/script.js"></script> 
</body>
</html>
